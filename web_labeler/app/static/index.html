<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceSAM Platform</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="stage">
        <div class="canvas-surface">
          <div id="canvasViewport" class="canvas-viewport">
            <img id="imageLayer" alt="" />
            <canvas id="overlayCanvas"></canvas>
          </div>
        </div>

        <header class="floating-bar top-left">
          <div class="brand-chip">
            <div class="brand-dot">T</div>
            <div class="brand-copy">
              <strong>TraceSAM</strong>
              <span>OBB Workspace</span>
            </div>
          </div>

          <div class="toolbar-group compact">
            <button id="selectModeButton" class="tool active">Select</button>
            <button id="drawModeButton" class="tool">Draw</button>
            <button id="samModeButton" class="tool accent">Smart</button>
          </div>

          <div class="toolbar-group compact">
            <label class="mini-field mini-select">
              <span>Model</span>
              <select id="formatSelect"></select>
            </label>
          </div>

          <div class="toolbar-group compact">
            <button id="deleteShapeButton" class="icon-btn danger" title="删除选中">⌫</button>
            <button id="saveButton" class="icon-btn success" title="保存">⭳</button>
          </div>
        </header>

        <section class="floating-panel workspace-panel">
          <div class="panel-head">
            <div>
              <h2>Workspace</h2>
              <p>选择图片目录与标签目录</p>
            </div>
            <button id="refreshButton" class="ghost small">刷新</button>
          </div>

          <label class="field">
            <span>图片目录</span>
            <div class="field-row">
              <input id="imageDirInput" type="text" placeholder="/home/xf/TraceSAM/images" />
              <button id="browseImageDirButton" class="ghost small">浏览</button>
            </div>
          </label>

          <label class="field">
            <span>标签目录</span>
            <div class="field-row">
              <input id="labelDirInput" type="text" placeholder="/home/xf/TraceSAM/labels" />
              <button id="browseLabelDirButton" class="ghost small">浏览</button>
            </div>
          </label>

          <div class="panel-actions">
            <button id="loadWorkspaceButton" class="primary wide">加载工作区</button>
          </div>

          <label class="field">
            <span>类别列表</span>
            <textarea id="classNamesInput" rows="5" placeholder="car&#10;truck&#10;plane"></textarea>
          </label>

          <label class="field">
            <span>搜索图片</span>
            <input id="imageSearchInput" type="text" placeholder="Search images..." />
          </label>

          <div class="subsection-title">
            <span>Images</span>
            <strong><span id="imageCount">0</span></strong>
          </div>
          <div id="imageList" class="image-list"></div>
        </section>

        <section class="floating-panel inspector-panel">
          <div class="panel-head">
            <div>
              <h2>Objects</h2>
              <p id="statusText">Select an image to begin</p>
            </div>
            <div class="status-stack">
              <span class="tiny-stat">状态 <strong id="statusBadge">Idle</strong></span>
              <span class="tiny-stat">模式 <strong id="modeBadge">Select</strong></span>
            </div>
          </div>

          <label class="field">
            <span>Label</span>
            <input id="labelEditor" type="text" placeholder="class id or name" />
          </label>

          <div class="two-col">
            <label class="field">
              <span>Confidence</span>
              <input id="confidenceEditor" type="number" step="0.001" placeholder="0.82" />
            </label>
            <label class="field">
              <span>Track ID</span>
              <input id="trackIdEditor" type="number" step="1" placeholder="12" />
            </label>
          </div>

          <label class="check-row">
            <input id="difficultEditor" type="checkbox" />
            <span>Difficult</span>
          </label>

          <div class="subsection-title">
            <span>Annotations</span>
            <strong id="labelCount">0</strong>
          </div>
          <div id="shapeList" class="shape-list"></div>
        </section>

        <footer class="floating-bar bottom-bar">
          <div class="bottom-info">
            <div class="meta-pill">
              <span id="imageTitle">Select an image to begin</span>
            </div>
            <div class="meta-pill">
              <span id="imageMeta">-</span>
            </div>
          </div>

          <div class="toolbar-group compact">
            <button id="prevImageButton" class="ghost small">上一张</button>
            <button id="nextImageButton" class="ghost small">下一张</button>
          </div>
        </footer>
      </main>
    </div>

    <dialog id="directoryDialog" class="dir-dialog">
      <div class="dialog-head">
        <div>
          <h3 id="directoryDialogTitle">选择目录</h3>
          <p id="directoryCurrentPath">-</p>
        </div>
        <button id="closeDirectoryDialog" class="ghost small">关闭</button>
      </div>
      <div class="dialog-tools">
        <button id="goParentDirectoryButton" class="ghost small">上一级</button>
        <button id="chooseCurrentDirectoryButton" class="primary small">使用当前目录</button>
      </div>
      <div id="directoryList" class="directory-list"></div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
