<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceSAM Studio</title>
    <link rel="stylesheet" href="/styles.css?v=studio-20260416-2" />
  </head>
  <body>
    <div class="studio-shell">
      <main class="studio-stage">
        <div class="canvas-layer">
          <div id="canvasViewport" class="canvas-viewport">
            <img id="imageLayer" alt="" />
            <canvas id="overlayCanvas"></canvas>
          </div>
        </div>

        <header class="top-toolbelt">
          <div class="brand-pill">
            <div class="brand-icon">T</div>
            <div class="brand-text">
              <strong>TraceSAM Studio</strong>
              <span>Ultralytics-style OBB workspace</span>
            </div>
          </div>

          <div class="toolbelt-segment">
            <button id="selectModeButton" class="tool-btn active">Select</button>
            <button id="drawModeButton" class="tool-btn">Draw</button>
            <button id="samModeButton" class="tool-btn smart">Smart</button>
          </div>

          <div class="toolbelt-segment">
            <label class="model-picker">
              <span>Format</span>
              <select id="formatSelect"></select>
            </label>
          </div>

          <div class="toolbelt-segment">
            <button id="deleteShapeButton" class="icon-btn danger" title="删除选中">⌫</button>
            <button id="saveButton" class="icon-btn success" title="保存标签">⭳</button>
          </div>
        </header>

        <aside class="left-dock">
          <section class="dock-card workspace-card">
            <div class="dock-head">
              <div>
                <h2>Workspace</h2>
                <p>分开选择图片目录与标签目录</p>
              </div>
              <button id="refreshButton" class="ghost-btn">刷新</button>
            </div>

            <label class="field-block">
              <span>图片目录</span>
              <div class="inline-input">
                <input id="imageDirInput" type="text" placeholder="/home/xf/TraceSAM/images" />
                <button id="browseImageDirButton" class="ghost-btn">浏览</button>
              </div>
            </label>

            <label class="field-block">
              <span>标签目录</span>
              <div class="inline-input">
                <input id="labelDirInput" type="text" placeholder="/home/xf/TraceSAM/labels" />
                <button id="browseLabelDirButton" class="ghost-btn">浏览</button>
              </div>
            </label>

            <button id="loadWorkspaceButton" class="primary-btn wide">加载工作区</button>
          </section>

          <section class="dock-card classes-card">
            <div class="dock-head">
              <div>
                <h2>Classes</h2>
                <p>类别列表会影响保存的 class id</p>
              </div>
            </div>
            <label class="field-block">
              <span>Class Names</span>
              <textarea id="classNamesInput" rows="7" placeholder="car&#10;truck&#10;plane"></textarea>
            </label>
          </section>
        </aside>

        <aside class="right-dock">
          <section class="dock-card images-card">
            <div class="dock-head">
              <div>
                <h2>Images</h2>
                <p><span id="imageCount">0</span> loaded</p>
              </div>
            </div>

            <label class="field-block">
              <span>Search</span>
              <input id="imageSearchInput" type="text" placeholder="Search images..." />
            </label>

            <div id="imageList" class="image-list"></div>
          </section>

          <section class="dock-card inspector-card">
            <div class="dock-head">
              <div>
                <h2>Objects</h2>
                <p id="statusText">Select an image to begin</p>
              </div>
              <div class="status-mini">
                <span>Status <strong id="statusBadge">Idle</strong></span>
                <span>Mode <strong id="modeBadge">Select</strong></span>
              </div>
            </div>

            <label class="field-block">
              <span>Label</span>
              <input id="labelEditor" type="text" placeholder="class name / class id" />
            </label>

            <div class="grid-two">
              <label class="field-block">
                <span>Confidence</span>
                <input id="confidenceEditor" type="number" step="0.001" placeholder="0.82" />
              </label>
              <label class="field-block">
                <span>Track ID</span>
                <input id="trackIdEditor" type="number" step="1" placeholder="12" />
              </label>
            </div>

            <label class="toggle-row">
              <input id="difficultEditor" type="checkbox" />
              <span>Difficult</span>
            </label>

            <div class="list-header">
              <span>Annotations</span>
              <strong id="labelCount">0</strong>
            </div>
            <div id="shapeList" class="shape-list"></div>
          </section>
        </aside>

        <footer class="bottom-hud">
          <div class="hud-pill strong">
            <span id="imageTitle">Select an image to begin</span>
          </div>
          <div class="hud-pill">
            <span id="imageMeta">-</span>
          </div>
          <div class="hud-controls">
            <button id="prevImageButton" class="ghost-btn small">上一张</button>
            <button id="nextImageButton" class="ghost-btn small">下一张</button>
          </div>
        </footer>
      </main>
    </div>

    <dialog id="directoryDialog" class="dir-dialog">
      <div class="dialog-head">
        <div>
          <h3 id="directoryDialogTitle">选择目录</h3>
          <p id="directoryCurrentPath">-</p>
        </div>
        <button id="closeDirectoryDialog" class="ghost-btn small">关闭</button>
      </div>
      <div class="dialog-toolbar">
        <button id="goParentDirectoryButton" class="ghost-btn small">上一级</button>
        <button id="chooseCurrentDirectoryButton" class="primary-btn small">使用当前目录</button>
      </div>
      <div id="directoryList" class="directory-list"></div>
    </dialog>

    <script src="/app.js?v=studio-20260416-2" type="module"></script>
  </body>
</html>
